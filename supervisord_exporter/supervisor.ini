[unix_http_server]
chmod=0777                       ; socket file mode (default 0700)

[inet_http_server]
port = 0.0.0.0:9001

[program:foo]
command=sleep 3600
process_name=foo%(process_num)d
numprocs=1
directory=/tmp
user=nobody
autostart=true
autorestart=true
redirect_stderr=true
startretries=30
stdout_logfile=/var/log/supervisor/foostdout.log
stderr_logfile=/var/log/supervisor/foostderr.log
