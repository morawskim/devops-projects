services:
  traefik:
    image: traefik:v3.6
    command:
      - "--providers.docker=true"
      - "--providers.docker.network=rewrite"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "8888:80"
      - "8080:8080"
    networks:
      - default
      - rewrite
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
networks:
  rewrite:
    external: true
